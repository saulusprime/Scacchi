<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tris — partita 1</title>
  <style>
    :root {
      --bg:#0f1419; --panel:#1b232d; --accent:#d9a441; --text:#e8eaed;
      --muted:#9aa4af; --line:#2c3742;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
           background:var(--bg); color:var(--text); }
    a { color:var(--accent); }
    .wrap { max-width: 980px; margin:0 auto; padding:0 20px; }
    header { background:var(--panel); border-bottom:2px solid var(--accent); }
    nav { display:flex; gap:18px; align-items:center; min-height:60px; flex-wrap:wrap; }
    nav a { color:var(--text); text-decoration:none; font-weight:500; }
    nav a:hover { color:var(--accent); }
    nav .brand { font-size:1.3rem; font-weight:700; color:var(--accent); margin-right:auto; }
    main { padding:28px 0 60px; }
    h1,h2 { line-height:1.2; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
            padding:20px; margin-bottom:18px; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; }
    .btn { display:inline-block; background:var(--accent); color:#1a1a1a; padding:9px 16px;
           border-radius:8px; text-decoration:none; font-weight:600; border:none; cursor:pointer;
           font-size:1rem; }
    .btn.secondary { background:transparent; color:var(--accent); border:1px solid var(--accent); }
    form p { margin:0 0 14px; }
    label { display:block; color:var(--muted); margin-bottom:4px; }
    input, select { width:100%; padding:8px 10px; border-radius:7px; border:1px solid var(--line);
                    background:#0f1419; color:var(--text); font-size:1rem; }
    .messages { list-style:none; padding:0; margin:0 0 18px; }
    .messages li { padding:10px 14px; border-radius:8px; margin-bottom:8px; }
    .messages .success { background:#16331f; border:1px solid #2e7d4f; }
    .messages .error { background:#3a1c1c; border:1px solid #a23b3b; }
    .muted { color:var(--muted); }
    .pill { background:var(--accent); color:#1a1a1a; border-radius:20px; padding:2px 10px;
            font-size:.8rem; font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
  </style>
</head>
<body>
  <header><div class="wrap"><nav>
    <a class="brand" href="/">♟ Scacchi</a>
    <a href="/">Home</a>
    <a href="/gioca/">Gioca</a>
    <a href="/giocatori/">Giocatori</a>
    <a href="/gruppi/">Gruppi</a>
    <a href="/classifiche/">Classifiche</a>
    <a href="/partite/registra/">Registra partita</a>
  </nav></div></header>
  <main><div class="wrap">
    
    
<style>
  .play { display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; }
  .board { display:grid; grid-template-columns:repeat(3,92px); grid-template-rows:repeat(3,92px);
           gap:6px; margin:8px 0; }
  .board form { margin:0; }
  .cell { width:92px; height:92px; font-size:2.6rem; font-weight:700; display:flex;
          align-items:center; justify-content:center; background:#0f1419;
          border:1px solid var(--line); border-radius:8px; color:var(--text); padding:0; }
  button.cell { cursor:pointer; }
  button.cell:hover:enabled { border-color:var(--accent); }
  button.cell:disabled { cursor:default; }
  .pop { animation: pop .28s ease-out; }
  @keyframes pop { from { transform:scale(.4); opacity:0; } to { transform:scale(1); opacity:1; } }
  .side { min-width:220px; flex:1; }
  .movelog { list-style:decimal inside; padding:0; margin:8px 0 0; max-height:300px; overflow:auto; }
  .movelog li { padding:4px 6px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  #thinking { display:none; color:var(--accent); font-weight:600; margin-top:8px; }
  #thinking::after { content:"…"; animation: dots 1s steps(4) infinite; }
  @keyframes dots { 0%{opacity:.2} 50%{opacity:1} 100%{opacity:.2} }
</style>

<div class="card">
  <h1>Tris</h1>
  <p class="muted">
    <strong>X</strong>: aldo
    (umano)
    &nbsp;·&nbsp;
    <strong>O</strong>: carla
    (umano)
  </p>

  <div class="play">
    <div>
      <div id="turninfo">
        
          <span class="pill">Ha vinto X</span>
        
      </div>
      <div class="board" id="board">
        
          
            
              <div class="cell">X</div>
            
          
            
              <div class="cell">X</div>
            
          
            
              <div class="cell">X</div>
            
          
        
          
            
              <div class="cell">O</div>
            
          
            
              <div class="cell">O</div>
            
          
            
              <div class="cell"></div>
            
          
        
          
            
              <div class="cell"></div>
            
          
            
              <div class="cell"></div>
            
          
            
              <div class="cell"></div>
            
          
        
      </div>
      <div id="thinking">L'IA sta pensando</div>
    </div>

    <div class="side">
      <h2>Mosse</h2>
      <ol class="movelog" id="movelog">
        <li>X → a1</li><li>O → a2</li><li>X → b1</li><li>O → b2</li><li>X → c1</li>
      </ol>
    </div>
  </div>

  <p style="margin-top:18px;">
    <a class="btn" href="/gioca/">Nuova partita</a>
    <a class="btn secondary" href="/classifiche/">Classifiche</a>
  </p>
</div>

<script>
(function () {
  const MOVE_URL = "/partite/1/mossa.json";
  const CSRF = "oh2U0IQl5HBgAaYv6RFZxrdzMP0sZo8tjdh2gQ0cqepsG89zCbOZM8JiQpOKfQ6I";
  const X_AI = false;
  const O_AI = false;
  const AI_DELAY = 700; // ms: piccolo ritardo prima di mostrare la mossa dell'IA

  const board = document.getElementById("board");
  const thinking = document.getElementById("thinking");
  let current = "";
  let status = "finished";
  let busy = false;

  if (!board) return;

  const symFor = (side) => (side === "x" ? "X" : "O");
  const sideIsAi = (side) => (side === "x" ? X_AI : O_AI);

  function cellForm(i) { return board.querySelector('.cellform[data-i="' + i + '"]'); }

  function placeMark(i, sym) {
    const form = cellForm(i);
    if (!form) return;
    const btn = form.querySelector("button");
    btn.textContent = sym;
    btn.classList.remove("empty");
    btn.classList.add("pop");
    btn.disabled = true;
  }

  function revertMark(i) {
    const form = cellForm(i);
    if (!form) return;
    const btn = form.querySelector("button");
    btn.textContent = "";
    btn.classList.add("empty");
    btn.classList.remove("pop");
    btn.disabled = false;
  }

  function disableAll() {
    board.querySelectorAll("button.cell").forEach((b) => (b.disabled = true));
  }

  function renderMoves(moves) {
    const ol = document.getElementById("movelog");
    ol.innerHTML = "";
    (moves || []).forEach((m) => {
      const li = document.createElement("li");
      li.textContent = m.player + " → " + m.notation;
      ol.appendChild(li);
    });
  }

  function setStatus(session) {
    status = session.status;
    current = session.current || "";
    const el = document.getElementById("turninfo");
    if (session.status === "finished") {
      el.innerHTML = session.winner === "draw"
        ? '<span class="pill">Patta</span>'
        : '<span class="pill">Ha vinto ' + session.winner.toUpperCase() + "</span>";
    } else {
      el.innerHTML = "Tocca a: <strong>" + current.toUpperCase() + "</strong>" +
        (session.current_is_ai ? " (IA)" : "");
    }
  }

  async function onClick(i) {
    if (busy || status !== "in_progress") return;
    const mover = current;
    if (sideIsAi(mover)) return;
    busy = true;
    placeMark(i, symFor(mover)); // mostra subito la mossa dell'umano
    const next = mover === "x" ? "o" : "x";
    if (sideIsAi(next)) thinking.style.display = "block";
    try {
      const res = await fetch(MOVE_URL, {
        method: "POST",
        headers: { "X-CSRFToken": CSRF, "Content-Type": "application/x-www-form-urlencoded" },
        body: "cell=" + i,
      });
      const session = await res.json();
      if (!res.ok) throw new Error(session.error || "Mossa non valida");
      renderMoves(session.moves);
      const ai = session.last_ai;
      if (ai && ai.cell !== null && ai.cell !== undefined) {
        setTimeout(() => {
          placeMark(ai.cell, session.board[ai.cell]); // mossa dell'IA animata
          thinking.style.display = "none";
          setStatus(session);
          if (session.status === "finished") disableAll();
          busy = false;
        }, AI_DELAY);
      } else {
        thinking.style.display = "none";
        setStatus(session);
        if (session.status === "finished") disableAll();
        busy = false;
      }
    } catch (err) {
      thinking.style.display = "none";
      revertMark(i);
      setStatus({ status: status, current: current, current_is_ai: sideIsAi(current) });
      alert(err.message || "Mossa non valida");
      busy = false;
    }
  }

  board.addEventListener("submit", function (e) {
    const form = e.target.closest(".cellform");
    if (!form) return;
    e.preventDefault(); // JS: animazione + delay; senza JS il form fa il POST normale
    onClick(parseInt(form.dataset.i, 10));
  });
})();
</script>

  </div></main>
</body>
</html>

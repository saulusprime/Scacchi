name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pipeline completa: lint (ruff check + format), catalogo i18n compilabile,
# migrazioni allineate ai modelli (alembic check) e l'intera suite pytest
# (engine + backend + frontend, configurata in pyproject.toml).
#
# Dipendenze di sistema:
# - stockfish: il commentatore/analisi girano col motore VERO nei test (le
#   asserzioni sono qualitative, qualsiasi versione UCI recente va bene);
# - gettext: msgfmt valida il catalogo .po (il .mo committato resta la fonte
#   a runtime).
# Il submodule integrazioni/KittenTTS serve a pip (backend/requirements.txt
# lo installa dalla root): checkout con submodules.

jobs:
  build:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout (con submodule KittenTTS)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            frontend/requirements.txt
            requirements-dev.txt

      - name: Dipendenze di sistema (Stockfish, gettext)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends stockfish gettext

      - name: Dipendenze Python
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt \
                      -r frontend/requirements.txt \
                      -r requirements-dev.txt

      - name: Lint (ruff check + format)
        run: |
          ruff check .
          ruff format --check .

      - name: Catalogo i18n compilabile (msgfmt)
        run: msgfmt --check-format -o /dev/null frontend/locale/en/LC_MESSAGES/django.po

      - name: Migrazioni allineate ai modelli (alembic check)
        working-directory: backend
        env:
          DATABASE_URL: sqlite:////tmp/omniboard-ci.db
          ADMIN_TOKEN: ci-only
        run: |
          alembic upgrade head
          alembic check

      - name: Test (pytest)
        run: pytest -q
